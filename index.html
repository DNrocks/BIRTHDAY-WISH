<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday ✨</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ffd6e8, #e0c3fc);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
  overflow-y: auto;
}

/* Falling background confetti */
.confetti {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}

.confetti span {
  position: absolute;
  top: -10%;
  width: 8px;
  height: 14px;
  opacity: 0.7;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(120vh) rotate(360deg);
  }
}

.card {
  background: rgba(255,255,255,0.92);
  padding: 30px 25px;
  border-radius: 20px;
  max-width: 380px;
  width: 90%;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  position: relative;
  z-index: 2;
}

.hero-img {
  width: 150px;
  max-width: 80%;
  margin: 10px auto;
  border-radius: 12px;
  display: block;
}

.cake {
  font-size: 3.5rem;
}

h1 { margin: 10px 0; }
h2 { font-weight: 400; font-size: 1.05rem; color: #555; }

.message {
  font-size: 0.95rem;
  margin: 15px 0;
}
</style>

</head>

<body>

<!-- Background Confetti -->
<div class="confetti">
  <span style="left:10%;background:#ff4d6d;animation-duration:10s"></span>
  <span style="left:25%;background:#ffd166;animation-duration:12s"></span>
  <span style="left:40%;background:#9b5de5;animation-duration:9s"></span>
  <span style="left:55%;background:#4cc9f0;animation-duration:11s"></span>
  <span style="left:70%;background:#f72585;animation-duration:8s"></span>
  <span style="left:85%;background:#ffd166;animation-duration:13s"></span>
</div>

<div class="card">

  <img src="bir.gif" class="hero-img">

  <div class="cake">🎂</div>

  <h1>Shubh Janamdin Anoushka Ji🙏</h1>
  <h2>Ek saal bad gari🚗, daru🍺, aur boards hai💀</h2>

  <div class="message">
    Bure logo ke nazar🧿 se dur rahiye, sathark rahiye🧿🧿
  </div>

</div>

</body>
</html>
